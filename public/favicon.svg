<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="42" fill="url(#grad)"/>

  <!-- D-shaped play icon: left stem + right curve that ends in a sharp point (play arrow) -->
  <path d="
    M 44 42
    L 44 158
    L 88 158
    C 148 158 172 136 172 100
    C 172 64 148 42 88 42
    Z
    M 70 70
    L 70 130
    L 88 130
    C 126 130 142 118 142 100
    C 142 82 126 70 88 70
    Z
  " fill="white" fill-rule="evenodd" opacity="0.18"/>

  <!-- Clean forward-pointing arrow / play chevron (the real icon mark) -->
  <path d="M 58 52 L 58 148 L 152 100 Z" fill="url(#textgrad)" opacity="0.95"/>

  <!-- Second smaller trailing chevron for speed/momentum feel -->
  <path d="M 90 70 L 90 130 L 152 100 Z" fill="white" opacity="0.6"/>
</svg>

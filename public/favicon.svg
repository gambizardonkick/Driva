    H 112
    Z
    M 212 194
    L 334 250
    Q 347 256 334 262
    L 212 318
    Q 198 324 198 310
    V 202
    Q 198 188 212 194
    Z"/>

  <!-- Gold sparkle -->
  <path fill="url(#spark)" d="M 404 70 C 412 99 419 106 448 114 C 419 122 412 129 404 158 C 396 129 389 122 360 114 C 389 106 396 99 404 70 Z"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="dfill" x1="0.15" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#e9d5ff"/>
      <stop offset="0.45" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.1" r="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#8b5cf6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Tile -->
  <rect width="512" height="512" rx="120" fill="#0a0a16"/>
  <rect width="512" height="512" rx="120" fill="url(#glow)"/>
  <rect x="9" y="9" width="494" height="494" rx="111" fill="none" stroke="url(#edge)" stroke-width="18"/>

  <!-- D monogram with play-button counter (enlarged for small sizes) -->

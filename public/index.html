<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Driva.tv — Leaderboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #8b5cf6;
      --purple-light: #a78bfa;
      --purple-dark: #6d28d9;
      --pink: #ec4899;
      --pink-bright: #f472b6;
      --blue: #3b82f6;
      --bg: #07070f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-purple: rgba(139,92,246,0.3);
      --text: #fff;
      --text-muted: #9ca3af;
      --green: #22c55e;
      --font-body: 'Inter', sans-serif;
      --font-head: 'Poppins', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── BOKEH BACKGROUND ── */
    .orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift linear infinite;
    }

    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: -120px; left: -80px;
      animation-duration: 22s;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #db2777 0%, transparent 70%);
      top: 10%; right: -100px;
      animation-duration: 28s;
      animation-delay: -8s;
      opacity: 0.45;
    }
    .orb-3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, #2563eb 0%, transparent 70%);
      bottom: 20%; left: 5%;
      animation-duration: 35s;
      animation-delay: -14s;
      opacity: 0.35;
    }
    .orb-4 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #9333ea 0%, transparent 70%);
      bottom: -60px; right: 15%;
      animation-duration: 25s;
      animation-delay: -5s;
      opacity: 0.4;
    }
    .orb-5 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #be185d 0%, transparent 70%);
      top: 45%; left: 40%;
      animation-duration: 40s;
      animation-delay: -20s;
      opacity: 0.3;
    }

    @keyframes drift {
      0%   { transform: translate(0px, 0px) scale(1); }
      25%  { transform: translate(30px, -20px) scale(1.05); }
      50%  { transform: translate(-20px, 30px) scale(0.97); }
      75%  { transform: translate(15px, 15px) scale(1.03); }
      100% { transform: translate(0px, 0px) scale(1); }
    }

    /* ── SCROLLBAR ── */
    * { scrollbar-width: thin; scrollbar-color: var(--purple) #1a1a24; }
    *::-webkit-scrollbar { width: 5px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 60px;
      background: rgba(7,7,15,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
    }

    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; text-decoration: none;
    }

    .nav-logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(139,92,246,0.5);
    }
    .nav-logo-icon svg { width: 16px; height: 16px; fill: #fff; }

    .nav-logo-text {
      font-family: var(--font-head);
      font-size: 19px; font-weight: 800;
      color: #fff; letter-spacing: -0.3px;
    }
    .nav-logo-text span { color: var(--purple-light); }

    .nav-play-btn {
      background: linear-gradient(135deg, var(--purple) 0%, #a21caf 100%);
      color: #fff;
      border: none; border-radius: 9px;
      padding: 9px 22px;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(139,92,246,0.4);
      text-decoration: none; letter-spacing: 0.2px;
    }
    .nav-play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(139,92,246,0.6);
    }

    /* ── LAYOUT ── */
    main {
      position: relative; z-index: 1;
      padding-top: 60px; min-height: 100vh;
    }

    /* ── HERO ── */
    .lb-hero {
      text-align: center;
      padding: 60px 24px 36px;
    }

    .hero-platform {
      font-family: var(--font-head);
      font-size: clamp(44px, 7vw, 80px);
      font-weight: 900;
      color: #fff;
      line-height: 1;
      margin-bottom: 8px;
      text-shadow: 0 0 60px rgba(139,92,246,0.4);
    }

    .hero-pool {
      font-family: var(--font-head);
      font-size: clamp(42px, 7vw, 78px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f472b6 0%, #ec4899 50%, #db2777 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(236,72,153,0.5));
    }

    .hero-label {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 32px;
      letter-spacing: 0.2px;
    }

    /* ── PILLS / TABS ── */
    .pill-row {
      display: flex; gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .pill {
      padding: 9px 24px;
      border-radius: 50px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text-muted);
      transition: all 0.18s;
      letter-spacing: 0.2px;
    }
    .pill:hover { color: #fff; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }
    .pill.active {
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 18px rgba(139,92,246,0.45);
    }

    .play-pill {
      padding: 9px 24px;
      border-radius: 50px;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--purple) 0%, #a21caf 100%);
      color: #fff;
      transition: all 0.18s;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(139,92,246,0.35);
    }
    .play-pill:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(139,92,246,0.55); }

    /* ── CONTAINER ── */
    .lb-container { max-width: 980px; margin: 0 auto; padding: 0 20px 80px; }

    /* ── COUNTDOWN ── */
    .countdown-wrap {
      display: flex; justify-content: center; gap: 12px;
      margin-bottom: 36px; flex-wrap: wrap;
    }

    .countdown-unit {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 24px;
      text-align: center;
      min-width: 88px;
      backdrop-filter: blur(10px);
    }

    .countdown-num {
      font-family: var(--font-head);
      font-size: 36px; font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .countdown-label {
      font-size: 10px; color: var(--text-muted);
      margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;
    }

    /* ── PERIOD INFO ── */
    .period-info {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 24px;
    }
    .period-info strong { color: rgba(255,255,255,0.75); }

    /* ── PODIUM ── */
    .podium {
      display: grid;
      grid-template-columns: 1fr 1.08fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
      align-items: end;
    }

    .podium-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 18px 24px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .podium-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at top, rgba(139,92,246,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .podium-card:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }

    .podium-card.rank-1 {
      border-color: rgba(139,92,246,0.45);
      background: rgba(139,92,246,0.08);
      padding-top: 36px;
    }
    .podium-card.rank-1::before {
      background: radial-gradient(ellipse at top, rgba(139,92,246,0.18) 0%, transparent 65%);
    }

    .avatar-wrap { position: relative; display: inline-block; margin-bottom: 14px; }

    .avatar {
      width: 76px; height: 76px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple) 0%, #a21caf 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 30px; font-weight: 900;
      color: #fff;
      box-shadow: 0 8px 24px rgba(139,92,246,0.4);
    }

    .rank-badge {
      position: absolute; bottom: -2px; right: -2px;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900;
      border: 2px solid var(--bg);
    }
    .rank-badge.r1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; }
    .rank-badge.r2 { background: linear-gradient(135deg, #cbd5e1, #94a3b8); color: #000; }
    .rank-badge.r3 { background: linear-gradient(135deg, #cd7c3c, #b45309); color: #fff; }

    .podium-name {
      font-weight: 700; font-size: 15px; margin-bottom: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .podium-wagered { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
    .podium-label { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; letter-spacing: 0.3px; }
    .podium-prize { font-size: 22px; font-weight: 900; color: var(--green); margin-bottom: 2px; }
    .podium-prize-label { font-size: 11px; color: var(--text-muted); }

    /* ── TABLE ── */
    .lb-table-wrap {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: rgba(139,92,246,0.07); }

    th {
      padding: 13px 20px;
      text-align: left;
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 13px 20px;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.025); }

    .rank-num { font-weight: 700; color: var(--text-muted); font-size: 13px; }
    .username-cell { font-weight: 600; }
    .wager-cell { font-weight: 700; }
    .prize-cell { font-weight: 800; color: var(--green); }

    /* ── RULES ── */
    .rules-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }
    .rules-box h3 { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--purple-light); text-transform: uppercase; letter-spacing: 0.5px; }
    .rules-box ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .rules-box li { font-size: 13px; color: var(--text-muted); padding-left: 16px; position: relative; line-height: 1.5; }
    .rules-box li::before { content: '·'; position: absolute; left: 0; color: var(--purple); font-size: 18px; line-height: 1; }

    /* ── LOADING / EMPTY ── */
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 24px; gap: 16px;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(139,92,246,0.15);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state p { color: var(--text-muted); font-size: 13px; }
    .no-data { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; }

    /* ── FOOTER ── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 20px 32px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      background: rgba(7,7,15,0.6);
      backdrop-filter: blur(10px);
    }
    .footer-logo { display: flex; align-items: center; gap: 8px; }
    .footer-logo-text { font-family: var(--font-head); font-size: 15px; font-weight: 800; color: rgba(255,255,255,0.3); }
    .footer-logo-text span { color: var(--purple); }
    footer p { font-size: 12px; color: rgba(255,255,255,0.2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      nav { padding: 0 16px; }
      .hero-platform { font-size: 44px; }
      .hero-pool { font-size: 42px; }
      .podium { grid-template-columns: 1fr; gap: 10px; }
      .podium-card.rank-1 { order: 0; }
      .podium-card.rank-2 { order: 1; }
      .podium-card.rank-3 { order: 2; }
      th:nth-child(3), td:nth-child(3) { display: none; }
      .countdown-unit { min-width: 70px; padding: 14px 16px; }
      .countdown-num { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>
</div>

<nav>
  <a class="nav-logo" href="#">
    <img src="/logo.svg" alt="Driva.tv" style="height:36px;width:auto;"/>
    <div class="nav-logo-text">Driva<span>.tv</span></div>
  </a>
  <a class="nav-play-btn" href="https://shuffle.com/?r=DRIVA" target="_blank" rel="noopener">Play Now</a>
</nav>

<main>
  <div class="lb-hero">
    <div class="hero-platform">Shuffle</div>
    <div class="hero-pool" id="lb-pool-display">$15,001.00</div>
    <div class="hero-label">Monthly Leaderboard</div>

    <div class="pill-row">
      <button class="pill active" id="tab-current" onclick="setPeriod('current')">Current Period</button>
      <button class="pill" id="tab-previous" onclick="setPeriod('previous')">Last Period</button>
      <a class="play-pill" href="https://shuffle.com/?r=DRIVA" target="_blank" rel="noopener">Play Now</a>
    </div>
  </div>

  <div class="lb-container" id="lb-content">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading leaderboard…</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">
    <div class="nav-logo-icon" style="width:26px;height:26px;border-radius:7px;">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:#fff;"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="footer-logo-text">Driva<span>.tv</span></div>
  </div>
  <p>&copy; 2026 Driva.tv — All rights reserved</p>
</footer>

<script>
  let currentPeriod = 'current';
  let lbCache = {};
  let countdown = null;

  function fmt(n) {
    return new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
  }

  async function loadLeaderboard(period) {
    period = period || currentPeriod;
    document.getElementById('lb-content').innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Loading leaderboard…</p></div>`;
    try {
      const apiPeriod = period === 'previous' ? 'last' : period;
      const r = await fetch(`/api/leaderboard?period=${apiPeriod}&platform=shuffle`);
      const json = await r.json();
      lbCache[period] = json.data;
      currentPeriod = period;
      renderLeaderboard();
    } catch(e) {
      document.getElementById('lb-content').innerHTML = `<div class="no-data">Failed to load leaderboard data.</div>`;
    }
  }

  function setPeriod(p) {
    if (p === currentPeriod) return;
    document.getElementById('tab-current').classList.toggle('active', p === 'current');
    document.getElementById('tab-previous').classList.toggle('active', p === 'previous');
    currentPeriod = p;
    if (lbCache[p]) {
      renderLeaderboard();
    } else {
      loadLeaderboard(p);
    }
  }

  function renderLeaderboard() {
    const data = lbCache[currentPeriod];
    if (!data) return;

    const lb = data.all_leaderboards['shuffle'];
    if (!lb) return;

    const top3   = lb.top_three || [];
    const rest   = lb.rest_of_users || [];
    const prizes = lb.prizes || [];
    const period = lb.current_period || {};
    const sym    = lb.currency_symbol || '$';
    const totalPool = (data.platforms || []).find(p => p.slug === 'shuffle')?.active_leaderboard?.total_prize_pool;

    if (totalPool) {
      document.getElementById('lb-pool-display').textContent = sym + Number(totalPool).toLocaleString('en-US', { minimumFractionDigits: 2 });
    }

    // Countdown (current period only)
    let countdownHtml = '';
    if (currentPeriod === 'current' && period.endTimestamp) {
      countdownHtml = `<div class="countdown-wrap" id="countdown-wrap">
        <div class="countdown-unit"><div class="countdown-num" id="cd-d">--</div><div class="countdown-label">Days</div></div>
        <div class="countdown-unit"><div class="countdown-num" id="cd-h">--</div><div class="countdown-label">Hours</div></div>
        <div class="countdown-unit"><div class="countdown-num" id="cd-m">--</div><div class="countdown-label">Mins</div></div>
        <div class="countdown-unit"><div class="countdown-num" id="cd-s">--</div><div class="countdown-label">Secs</div></div>
      </div>`;
    }

    // Period dates
    const periodHtml = period.start
      ? `<div class="period-info">${period.start} &mdash; ${period.end}</div>`
      : '';

    // Podium — #2 left, #1 centre, #3 right
    const podiumOrder   = [1, 0, 2];
    const podiumClasses = ['rank-2', 'rank-1', 'rank-3'];
    const rankBadges    = ['r2', 'r1', 'r3'];
    const rankNums      = [2, 1, 3];

    const podiumCards = podiumOrder.map((idx, col) => {
      const u = top3[idx];
      if (!u) return `<div class="podium-card ${podiumClasses[col]}"></div>`;
      const init  = (u.displayName || '?')[0].toUpperCase();
      const prize = prizes[idx];
      return `<div class="podium-card ${podiumClasses[col]}">
        <div class="avatar-wrap">
          <div class="avatar">${init}</div>
          <div class="rank-badge ${rankBadges[col]}">#${rankNums[col]}</div>
        </div>
        <div class="podium-name">${u.displayName}</div>
        <div class="podium-wagered">${sym}${fmt(u.wagered)}</div>
        <div class="podium-label">Wagered</div>
        ${prize ? `<div class="podium-prize">${sym}${fmt(prize.amount)}</div><div class="podium-prize-label">Prize</div>` : ''}
      </div>`;
    }).join('');

    // Table rows 4+
    const tableRows = rest.map((u, i) => {
      const rank  = i + 4;
      const prize = prizes[rank - 1];
      return `<tr>
        <td><span class="rank-num">#${rank}</span></td>
        <td><span class="username-cell">${u.displayName}</span></td>
        <td><span class="wager-cell">${sym}${fmt(u.wagered)}</span></td>
        <td><span class="prize-cell">${prize ? sym + fmt(prize.amount) : '—'}</span></td>
      </tr>`;
    }).join('');

    // Rules
    const rules = lb.rules || [];
    const rulesHtml = rules.length
      ? `<div class="rules-box"><h3>Rules</h3><ul>${rules.map(r => `<li>${r.replace(/\bROMIX\b/gi, 'DRIVA')}</li>`).join('')}</ul></div>`
      : '';

    document.getElementById('lb-content').innerHTML = `
      ${countdownHtml}
      ${periodHtml}
      <div class="podium">${podiumCards}</div>
      ${tableRows ? `<div class="lb-table-wrap">
        <table>
          <thead><tr><th>Rank</th><th>Player</th><th>Wagered</th><th>Prize</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>` : ''}
      ${rulesHtml}
    `;

    if (countdown) clearInterval(countdown);
    if (currentPeriod === 'current' && period.endTimestamp) {
      countdown = setInterval(() => tick(period.endTimestamp), 1000);
      tick(period.endTimestamp);
    }
  }

  function tick(endTs) {
    const diff = endTs - Date.now();
    if (diff <= 0) { clearInterval(countdown); return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    const pad = n => String(n).padStart(2, '0');
    const el  = id => document.getElementById(id);
    if (el('cd-d')) {
      el('cd-d').textContent = d;
      el('cd-h').textContent = pad(h);
      el('cd-m').textContent = pad(m);
      el('cd-s').textContent = pad(s);
    }
  }

  loadLeaderboard('current');
</script>
</body>
</html>
